name: Release

# Run on every push to main. Two outcomes, decided by changesets/action:
#  - if unreleased changesets exist  -> open/update a "Version Packages" PR
#  - if none exist but package.json is ahead of npm -> publish to npm
on:
  push:
    branches: [main]

# Never run two releases at once.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # push the version commit and git tags
  pull-requests: write # open/update the "Version Packages" PR
  id-token: write # mint the OIDC token for npm trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24 # OIDC trusted publishing needs Node >= 22.14
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest # OIDC requires npm >= 11.5.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate (types, tests, build)
        run: |
          pnpm typecheck
          pnpm test run
          pnpm build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # No NPM_TOKEN: publishing authenticates via OIDC (id-token: write
        # above + the trusted publisher configured on npmjs.com). Provenance
        # is generated automatically.
